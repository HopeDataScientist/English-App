<style>
  :root{
    --bg:#E9EFE9;
    --bg-deep:#DCE6DD;
    --card:#FBFBF7;
    --ink:#1F2A24;
    --ink-soft:#5B6A5F;
    --line:#C7D2C6;
    --accent:#E3A03D;
    --accent-ink:#5C3E0F;
    --plum:#8B5E6B;
    --moss:#6B8F71;
    --tag-am:#C98A3D;
    --tag-meal:#B85C4A;
    --tag-play:#5C8AA6;
    --tag-hyg:#6B9C8F;
    --tag-night:#7A6BA6;
    --tag-safe:#B85C6B;
    --tag-out:#4A7A96;
    --tag-chore:#8A9A5B;
    --tag-praise:#C97A9E;
    --tag-hurt:#A65C4A;
    --tag-emo:#9B6BC9;
    --tag-sib:#5FA88A;
    --tag-season:#C9A03D;
    --tag-nap:#6B7A9C;
    --tag-media:#9C8A5C;
    --tag-rule:#5C6B9C;
    --radius:18px;
    --shadow: 0 10px 30px -14px rgba(31,42,36,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% -10%, #F2EFDD 0%, transparent 45%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    min-height:100vh;
    font-family:'Figtree', -apple-system, sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
  }
  #phone{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:transparent;
    position:relative;
    display:flex;
    flex-direction:column;
  }
  #app{
    flex:1;
    padding:20px 18px 100px;
    overflow-y:auto;
  }
  h1,h2,h3{font-family:'Fraunces', serif; margin:0; letter-spacing:-0.01em;}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  button{font-family:inherit; cursor:pointer;}
  .btn-primary{
    background:var(--ink);
    color:#F7F5EE;
    border:none;
    border-radius:999px;
    padding:14px 22px;
    font-size:15px;
    font-weight:600;
    width:100%;
    transition:transform .15s ease, opacity .15s ease;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{opacity:0.4;}
  .btn-ghost{
    background:transparent;
    border:1.5px solid var(--line);
    color:var(--ink);
    border-radius:999px;
    padding:12px 18px;
    font-size:14px;
    font-weight:600;
    width:100%;
  }
  input[type=text], input[type=date]{
    width:100%;
    padding:13px 14px;
    border-radius:12px;
    border:1.5px solid var(--line);
    background:var(--card);
    font-family:inherit;
    font-size:15px;
    color:var(--ink);
  }
  input:focus{outline:2px solid var(--accent); outline-offset:1px;}
  .card{
    background:var(--card);
    border-radius:var(--radius);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
    padding:18px;
  }

  /* ---------- 온보딩 ---------- */
  .onboard-wrap{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:32px 26px;
  }
  .onboard-badge{
    width:56px;height:56px;border-radius:16px;
    background:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    margin-bottom:18px;
    transform:rotate(-6deg);
  }
  .onboard-wrap h1{font-size:30px; line-height:1.25; margin-bottom:10px;}
  .onboard-wrap p{color:var(--ink-soft); font-size:15px; line-height:1.55; margin:0 0 26px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px;}

  /* ---------- 하단 네비 ---------- */
  #nav{
    position:fixed;
    bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:430px;
    background:rgba(251,251,247,0.92);
    backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index:50;
  }
  .nav-btn{
    flex:1;
    background:none; border:none;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:6px 2px;
    color:var(--ink-soft);
    font-size:10.5px;
    font-weight:600;
    border-radius:12px;
  }
  .nav-btn.active{color:var(--ink); background:#EFEBDD;}
  .nav-btn .ic{font-size:19px;}

  /* ---------- 홈 ---------- */
  .home-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:22px;}
  .streak-chip{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:999px;
    padding:6px 12px;
    display:flex; align-items:center; gap:5px;
  }
  .deck{
    position:relative;
    height:190px;
    margin:6px 0 26px;
  }
  .deck-card{
    position:absolute; inset:0;
    border-radius:20px;
    border:1px solid var(--line);
  }
  .deck-card.c3{background:#D9CBB0; transform:rotate(-8deg) translateY(6px);}
  .deck-card.c2{background:#E7DCC4; transform:rotate(5deg) translateY(3px);}
  .deck-card.c1{
    background:var(--card);
    display:flex; flex-direction:column; justify-content:space-between;
    padding:20px;
    box-shadow:var(--shadow);
  }
  .deck-card.c1 .num{font-family:'Fraunces',serif; font-size:44px; line-height:1;}
  .deck-card.c1 .label{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; color:var(--ink-soft); text-transform:uppercase;}
  .search-box{margin-bottom:18px;}
  .result-row{
    display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px 14px; margin-bottom:8px;
  }
  .tag-dot{width:8px;height:8px;border-radius:50%; flex-shrink:0;}
  .result-row .txt{flex:1; min-width:0;}
  .result-row .txt .kr{font-size:14px; font-weight:600;}
  .result-row .txt .en{font-size:12px; color:var(--ink-soft);}
  .section-title{font-size:13px; font-weight:700; color:var(--ink-soft); margin:22px 0 10px; text-transform:uppercase; letter-spacing:.06em; font-family:'IBM Plex Mono',monospace;}

  /* ---------- 퀴즈 ---------- */
  .progress-track{height:5px; background:var(--line); border-radius:99px; overflow:hidden; margin-bottom:18px;}
  .progress-fill{height:100%; background:var(--accent); transition:width .3s ease;}
  .tag-pill{
    display:inline-flex; align-items:center; gap:5px;
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em;
    background:var(--card); border:1px solid var(--line); padding:4px 10px; border-radius:999px;
    margin-bottom:14px;
  }
  .quiz-prompt{font-size:18px; font-weight:600; line-height:1.4; margin-bottom:18px;}
  .opt-btn{
    display:block; width:100%; text-align:left;
    background:var(--card); border:1.5px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-bottom:10px; font-size:15px; font-weight:500;
  }
  .opt-btn.correct{border-color:var(--moss); background:#E4EFE4;}
  .opt-btn.wrong{border-color:var(--plum); background:#F3E6E9;}
  .chunk-area{
    min-height:56px; border:1.5px dashed var(--line); border-radius:14px;
    padding:10px; display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; align-items:center;
  }
  .chunk-pool{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;}
  .chunk{
    background:var(--card); border:1.5px solid var(--line); border-radius:10px;
    padding:8px 12px; font-size:14px; font-weight:600;
  }
  .chunk.used{opacity:0.3;}
  .feedback{border-radius:16px; padding:16px; margin-top:16px;}
  .feedback.ok{background:#E4EFE4; border:1px solid var(--moss);}
  .feedback.no{background:#F3E6E9; border:1px solid var(--plum);}
  .feedback .en{font-family:'Fraunces',serif; font-size:19px; margin-bottom:4px;}
  .ans-hl{background:var(--accent); color:var(--accent-ink); padding:1px 5px; border-radius:6px; font-weight:700; font-style:normal;}
  .word-tap{cursor:pointer; border-bottom:1.5px dotted var(--ink-soft); text-underline-offset:2px;}
  .word-tap.ans-hl{border-bottom:none;}
  .feedback .kr{font-size:14px; color:var(--ink-soft); margin-bottom:10px;}
  .feedback .tip{font-size:13px; line-height:1.55; color:var(--ink); background:rgba(255,255,255,0.5); padding:10px 12px; border-radius:10px;}
  .reason-row{display:flex; gap:8px; margin-top:14px;}
  .reason-row button{flex:1; font-size:12px; padding:9px 4px;}
  .play-btn{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--ink); color:#F7F5EE; border:none; border-radius:999px;
    padding:9px 15px; font-size:13px; font-weight:600; margin-bottom:14px;
  }
  .mic-btn{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--accent); color:var(--accent-ink); border:none; border-radius:999px;
    padding:9px 15px; font-size:13px; font-weight:700; margin-left:8px;
  }
  .mic-btn.rec{background:var(--plum); color:white;}

  /* ---------- 결과 ---------- */
  .result-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px 14px; margin-bottom:8px;
  }
  .toggle{
    width:44px; height:26px; border-radius:99px; background:var(--line); position:relative; border:none; flex-shrink:0;
  }
  .toggle.on{background:var(--moss);}
  .toggle .dot{
    position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:white; transition:left .15s ease;
  }
  .toggle.on .dot{left:21px;}

  /* ---------- 오답노트 / 즐겨찾기 ---------- */
  .filter-row{display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; padding-bottom:2px;}
  .filter-chip{
    flex-shrink:0; font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:999px;
    background:var(--card); border:1px solid var(--line); color:var(--ink-soft);
  }
  .filter-chip.active{background:var(--ink); color:#F7F5EE; border-color:var(--ink);}
  .note-card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:10px;}
  .note-card .top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .note-card .en{font-family:'Fraunces',serif; font-size:16px;}
  .note-card .kr{font-size:13px; color:var(--ink-soft); margin-top:2px;}
  .due-badge{font-family:'IBM Plex Mono',monospace; font-size:10px; padding:3px 8px; border-radius:999px; white-space:nowrap;}
  .due-badge.today{background:var(--accent); color:var(--accent-ink);}
  .due-badge.later{background:var(--card); border:1px solid var(--line); color:var(--ink-soft);}
  .empty-state{text-align:center; padding:50px 20px; color:var(--ink-soft);}
  .empty-state .em{font-size:32px; margin-bottom:10px;}

  /* ---------- 라디오 ---------- */
  .radio-visual{
    height:150px; border-radius:20px; background:linear-gradient(135deg,#E3A03D,#8B5E6B);
    display:flex; align-items:center; justify-content:center; margin-bottom:18px; position:relative; overflow:hidden;
  }
  .radio-visual .wave{font-size:38px;}
  .chip-row{display:flex; gap:8px; margin-bottom:16px;}
  .chip-row button{flex:1; padding:10px 4px; border-radius:12px; border:1.5px solid var(--line); background:var(--card); font-size:13px; font-weight:600;}
  .chip-row button.active{background:var(--ink); color:#F7F5EE; border-color:var(--ink);}
  .now-playing{font-size:13px; color:var(--ink-soft); margin-top:10px; text-align:center;}

  /* ---------- 설정 ---------- */
  .settings-row{display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--line);}
  .settings-row:last-child{border-bottom:none;}
  .settings-row .lbl{font-size:14px; font-weight:600;}
  .settings-row .val{font-size:13px; color:var(--ink-soft);}
  .danger-btn{color:var(--plum); background:none; border:1.5px solid var(--plum); border-radius:999px; padding:10px 16px; font-size:13px; font-weight:700; width:100%;}

  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#F7F5EE; padding:10px 18px; border-radius:999px; font-size:13px; font-weight:600;
    box-shadow:var(--shadow); z-index:100; opacity:0; transition:opacity .25s ease;
  }
  .toast.show{opacity:1;}

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(31,42,36,0.5); z-index:80;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal-sheet{
    width:100%; max-width:430px; background:var(--card); border-radius:22px 22px 0 0;
    padding:22px 20px calc(22px + env(safe-area-inset-bottom)); box-shadow:0 -10px 40px rgba(0,0,0,0.2);
  }
  .modal-sheet .close-x{background:none;border:none;font-size:14px;color:var(--ink-soft);font-weight:600;}
</style>

   기존 태그들처럼 고유한 색이 자동으로 배정되게 한다. */
function hashColor(str){
  let hash = 0;
  for(let i=0;i<str.length;i++){ hash = str.charCodeAt(i) + ((hash<<5)-hash); }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 45%, 42%)`;
}
function ensureTagRegistered(tag){

}

/* 결과/오답노트/즐겨찾기/검색/발음듣기에서 항상 "전체 문장"을 보여주기 위한 헬퍼.
   빈칸채우기: 정답 단어를 <mark>로 강조해 문장에 채워 넣음
   A-B뉘앙스: 정답 알파벳(A/B) 대신 그 알파벳에 해당하는 전체 문장을 뽑아옴
   그 외 유형: answer 필드가 이미 전체 문장이라 그대로 사용 */
function highlightedSentence(it, name){
  if(it.type==='빈칸채우기'){
    const filled = fillName(it.pattern, name);
    const idx = filled.indexOf('___');
    if(idx===-1) return escapeHtml(filled);
    const before = escapeHtml(filled.slice(0, idx));
    const after = escapeHtml(filled.slice(idx+3));
    return `${before}<mark class="ans-hl">${escapeHtml(fillName(it.answer, name))}</mark>${after}`;
  }
  if(it.type==='A-B뉘앙스'){
    return escapeHtml(plainFullSentence(it, name));
  }
  return escapeHtml(fillName(it.answer, name));
}
function plainFullSentence(it, name){
  if(it.type==='빈칸채우기'){
    return fillName(it.pattern, name).replace('___', fillName(it.answer, name));
  }
  if(it.type==='A-B뉘앙스'){
    const parts = it.pattern.split('/').map(s=>s.trim());
    const chosen = parts.find(p=>p.startsWith(it.answer+')')) || parts[0];
    return fillName(chosen.replace(/^[AB]\)\s*/,''), name);
  }
  return fillName(it.answer, name);
}

function renderSentenceInteractive(it, name){
  const full = plainFullSentence(it, name);
  const blankWord = (it.type==='빈칸채우기') ? fillName(it.answer, name).toLowerCase() : null;

  // 문장을 "단어" / "그 외(공백,문장부호)" 세그먼트로 분리
  const segments = [];
  full.replace(/([A-Za-z']+)|([^A-Za-z']+)/g, (m, word, other)=>{
    segments.push(word ? {isWord:true, text:word} : {isWord:false, text:other});
    return m;
  });
  const wordPositions = segments.map((s,i)=>s.isWord?i:-1).filter(i=>i>=0);

  function renderPlain(seg){
    if(!seg.isWord) return escapeHtml(seg.text);
    const key = seg.text.toLowerCase().replace(/^'+|'+$/g,'');
    const isBlank = blankWord && key===blankWord;
    const cls = 'word-tap' + (isBlank ? ' ans-hl' : '');
    return `<span class="${cls}" data-word="${escapeHtml(key)}">${escapeHtml(seg.text)}</span>`;
  }

  let out = '';
  let cursor = 0;
  let wi = 0;
  while(wi < wordPositions.length){
    let matched = null;
    for(const idiom of IDIOM_LIST){
      if(wi + idiom.length > wordPositions.length) continue;
      let ok = true;
      for(let k=0;k<idiom.length;k++){
        const t = segments[wordPositions[wi+k]].text.toLowerCase().replace(/^'+|'+$/g,'');
        if(t !== idiom[k]){ ok=false; break; }
      }
      if(ok){ matched = idiom; break; }
    }
    if(matched){
      const startSeg = wordPositions[wi];
      const endSeg = wordPositions[wi+matched.length-1];
      for(let s=cursor; s<startSeg; s++) out += renderPlain(segments[s]);
      let phraseText = '';
      for(let s=startSeg; s<=endSeg; s++) phraseText += segments[s].text;
      out += `<span class="word-tap" data-word="${escapeHtml(matched.join(' '))}">${escapeHtml(phraseText)}</span>`;
      cursor = endSeg + 1;
      wi += matched.length;
    } else {
      wi += 1;
    }
  }
  for(let s=cursor; s<segments.length; s++) out += renderPlain(segments[s]);
  return out;
}
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

/* 폰마다 기본으로 고르는 영어 음성 품질이 들쭉날쭉해서(로봇 음성이 걸릴 때가 있음),
   가능하면 Google의 신경망 기반 en-US 음성을 명시적으로 골라서 쓴다.
   voices 목록은 비동기로 채워질 때가 있어서 캐시해두고 필요하면 이벤트로 갱신한다. */
let CACHED_VOICES = [];
function refreshVoices(){
  try{ CACHED_VOICES = window.speechSynthesis.getVoices() || []; }catch(e){}
}
if('speechSynthesis' in window){
  refreshVoices();
  window.speechSynthesis.onvoiceschanged = refreshVoices;
}
function pickBestEnglishVoice(){
  if(!CACHED_VOICES.length) refreshVoices();
  const enVoices = CACHED_VOICES.filter(v=>v.lang && v.lang.toLowerCase().startsWith('en'));
  if(!enVoices.length) return null;
  const usVoices = enVoices.filter(v=>v.lang.toLowerCase()==='en-us');
  const pool = usVoices.length ? usVoices : enVoices;
  const google = pool.find(v=>/google/i.test(v.name));
  return google || pool[0];
}
/* 브라우저 내장 TTS는 문장 억양(의문문 끝 올라가는 것 등)을 표현할 방법이 없어서,
   실제 신경망 음성 합성(Gemini TTS)으로 문장을 통째로 합성해서 재생한다.
   같은 문장을 반복 재생할 땐 폰에 저장해둔 오디오를 그대로 쓰고,
   서버 호출/합성이 실패하면 예전 방식(브라우저 TTS)으로 자동 대체된다. */
const TTS_CACHE_PREFIX = 'ttsaudio_';
function ttsCacheKey(text){ return TTS_CACHE_PREFIX + text.trim().toLowerCase(); }
async function playNaturalTts(text, fallbackRate){
  if(!text) return;
  const cacheKey = ttsCacheKey(text);
  const cached = lsGet(cacheKey);
  if(cached && cached.audioBase64){
    try{
      const audio = new Audio('data:' + (cached.mimeType||'audio/wav') + ';base64,' + cached.audioBase64);
      await audio.play();
      return;
    }catch(e){ /* 캐시 재생 실패하면 아래에서 새로 받아옴 */ }
  }
  try{
    const res = await fetch(GAS_URL, {method:'POST', body: JSON.stringify({action:'tts', text})});
    const data = await res.json();
    if(data.ok && data.audioBase64){
      lsSet(cacheKey, {audioBase64: data.audioBase64, mimeType: data.mimeType||'audio/wav'});
      const audio = new Audio('data:' + (data.mimeType||'audio/wav') + ';base64,' + data.audioBase64);
      await audio.play();
      return;
    }
  }catch(e){ /* 네트워크 실패 등 — 아래에서 브라우저 TTS로 대체 */ }
  speak(text, fallbackRate);
}
function speak(text, rate){
  try{
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate = rate || 0.95; u.pitch = 1.05;
    const bestVoice = pickBestEnglishVoice();
    if(bestVoice) u.voice = bestVoice;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- storage ----------
   이전에는 window.storage(클로드 미리보기 화면 전용 API)를 썼는데,
   이 API는 클로드 대화창 안에서만 존재하고 파일을 다운로드해서 열거나
   PWA로 설치했을 때는 아예 없는 객체라 모든 저장이 조용히 실패하고 있었다.
   실제 배포/설치 환경에서 확실히 동작하는 localStorage로 교체한다. */
const LS_PREFIX = 'tfs_';
function lsGet(key){
  try{
    const raw = localStorage.getItem(LS_PREFIX+key);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function lsSet(key, value){
  try{ localStorage.setItem(LS_PREFIX+key, JSON.stringify(value)); return true; }
  catch(e){ return false; }
}

function pickDiverseFive(source){
  const shuffled = shuffle(source);
  const picked = [];
  const usedAnswerWords = new Set();
  for(const item of shuffled){
    const key = (item.type==='빈칸채우기') ? item.answer.trim().toLowerCase() : null;
    if(key && usedAnswerWords.has(key)) continue;
    picked.push(item);
    if(key) usedAnswerWords.add(key);
    if(picked.length>=5) break;
  }
  if(picked.length<5){
    for(const item of shuffled){
      if(picked.length>=5) break;
      if(!picked.includes(item)) picked.push(item);
    }
  }
  return picked;
}
function getTodayQueue(){
  const band = ageBandFor(monthsBetween(STATE.profile.birth));
  const pool = DATA.filter(d=>d.ageBand===band);
  if(STATE.progress.todayQueueDate === todayStr() && STATE.progress.todayQueueIds.length){
    return STATE.progress.todayQueueIds.map(id=>pool.find(x=>x.id===id)).filter(Boolean);
  }
  const unseen = pool.filter(d=>!STATE.progress.seenIds.includes(d.id));
  const source = unseen.length>=5 ? unseen : pool;
  const picked = pickDiverseFive(source);
  STATE.progress.todayQueueDate = todayStr();
  STATE.progress.todayQueueIds = picked.map(p=>p.id);
  saveProgress();
  return picked;
}

/* 저장 직전에 기존 300문장+커스텀 문장 안에서 비슷한 표현이 있는지 확인.
   AI 호출 없이 단어 겹침(자카드 유사도)만으로 대략 판단하는 가벼운 체크라,
   완벽하진 않지만 "완전히 똑같은 표현"이 중복 저장되는 건 충분히 걸러낸다. */
function normalizeForSimilarity(s){
  return (s||'').toLowerCase().replace(/[^a-z0-9가-힣\s]/g,'').trim();
}
function wordSet(s){
  return new Set(normalizeForSimilarity(s).split(/\s+/).filter(Boolean));
}
function jaccard(a,b){
  let inter = 0;
  a.forEach(x=>{ if(b.has(x)) inter++; });
  const union = new Set([...a, ...b]).size;
  return union ? inter/union : 0;
}
function findSimilarItems(item, threshold){
  threshold = threshold || 0.5;
  const targetSet = wordSet(item.pattern);
  const matches = [];
  DATA.forEach(d=>{
    const sim = jaccard(targetSet, wordSet(d.pattern));
    if(sim >= threshold) matches.push({item:d, sim});
  });
  matches.sort((a,b)=>b.sim-a.sim);
  return matches.slice(0,2);
}

async function runAiGenerate(situ){
  if(!situ){ showToast('상황을 먼저 입력해주세요'); return; }
  const exclude = STATE.aiHistory[situ] || [];
  STATE.ai = {status:'loading', item:null, chosenTag:null, useCustomTag:false, customTagValue:'', errorMsg:'', similarMatches:null};
  renderAppOnly();
  try{
    const ageMonths = monthsBetween(STATE.profile.birth);
    const res = await fetch(GAS_URL, {method:'POST', body: JSON.stringify({action:'generate', situation: situ, exclude, ageMonths})});
    const data = await res.json();
    if(data.ok && data.item){
      if(!STATE.aiHistory[situ]) STATE.aiHistory[situ] = [];
      STATE.aiHistory[situ].push(data.item.pattern);
      if(STATE.aiHistory[situ].length>6) STATE.aiHistory[situ].shift();
      STATE.ai = {
        status: data.item.isNewCategory ? 'chooseCategory' : 'result',
        item: data.item,
        chosenTag: data.item.isNewCategory ? null : data.item.tag,
        useCustomTag:false, customTagValue:'', errorMsg:'', similarMatches:null
      };
    } else if(data.rejected){
      STATE.ai = {status:'rejected', item:data.item||null, chosenTag:null, useCustomTag:false, customTagValue:'', errorMsg: data.reason||'검증을 통과하지 못했어요', similarMatches:null};
    } else {
      STATE.ai = {status:'error', item:null, chosenTag:null, useCustomTag:false, customTagValue:'', errorMsg:'', similarMatches:null};
    }
  }catch(e){
    STATE.ai = {status:'error', item:null, chosenTag:null, useCustomTag:false, customTagValue:'', errorMsg:'', similarMatches:null};
  }
  renderAppOnly();
}

function startQuiz(items){
  STATE.quiz = {
    queue: items, index:0, correctCount:0,
    answered:false, isCorrect:null, selected:null, chunkAssembled:[], chunkPool:[],
    reasonPending:false, sttResult:null, sttListening:false, results:[]

function screenQuiz(){
  const q = STATE.quiz;
  const it = currentQuizItem();
  const pct = Math.round((q.index/(q.queue.length))*100);
  let body = '';
  if(it.type==='상황매칭객관식') body = quizMultipleChoice(it, 'situ');

/* 단순 단어 겹침 비율만 보면 "all done"을 "are done"으로 잘못 인식했을 때처럼
   실제로는 아주 비슷한 발화도 오답 처리되는 경우가 많아, 문자열 전체의
   레벤슈타인 유사도까지 같이 보고 더 관대한 쪽 점수를 채택한다. */
function levenshtein(a, b){
  const m=a.length, n=b.length;
  const dp = [];
  for(let i=0;i<=m;i++){ dp.push([i]); }
  for(let j=1;j<=n;j++){ dp[0][j]=j; }
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
    }
  }
  return dp[m][n];
}
function sttSimilarity(target, said){
  const norm = s=>(s||'').toLowerCase().replace(/[^a-z ]/g,'').replace(/\s+/g,' ').trim();
  const t = norm(target), s = norm(said);
  if(!t || !s) return 0;
  const tWords = t.split(' ').filter(Boolean);
  const sWords = s.split(' ').filter(Boolean);
  const overlap = tWords.filter(w=>sWords.includes(w)).length / Math.max(tWords.length,1);
  const dist = levenshtein(t, s);
  const charSim = 1 - dist/Math.max(t.length, s.length, 1);
  return Math.max(overlap, charSim);
}
function startSTT(it){
  const Rec = window.webkitSpeechRecognition || window.SpeechRecognition;
  if(!Rec) return;
  const q = STATE.quiz;
  q.sttListening = true; render();
  try{
    const rec = new Rec();
    rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=1;
    rec.onresult = (e)=>{
      const transcript = e.results[0][0].transcript;
      q.sttResult = transcript; q.sttListening=false;
      const sim = sttSimilarity(it.answer, transcript);
      if(sim >= 0.55){
        markAnswer(true, transcript);
      }
      // 기준 미달이어도 바로 오답 처리하지 않는다 - 다시 말해볼 기회를 준다.
      render();
    };
    rec.onerror = ()=>{ q.sttListening=false; showToast('음성 인식에 실패했어요. 다시 시도해보세요.'); render(); };
    rec.onend = ()=>{ q.sttListening=false; render(); };
    rec.start();
  }catch(e){ q.sttListening=false; showToast('이 환경에서는 마이크 사용이 제한돼요.'); render(); }
}

function computeVariant(it){
  if(!it.variant || it.variant.startsWith('없음')) return it;
  const m = it.variant.match(/(.+?)→(.+)/);
  if(!m) return it;
  const from = m[1].trim();
  const options = m[2].split(',').map(s=>s.trim());
  const to = options[Math.floor(Math.random()*options.length)];
  const swap = (s)=> s.split(from).join(to);
  return {...it, pattern: swap(it.pattern), answer: swap(it.answer), meaning: it.meaning, _variantWord: to};
}

  const filtered = STATE.notebookFilter==='all' ? notes : notes.filter(n=>n.reason===STATE.notebookFilter);

  <div class="filter-row">
    ${['all','unknown','confuse','hearing'].map(f=>`

  </div>
  ${sorted.length===0 ? `<div class="empty-state"><div class="em">📝</div>아직 복습할 문장이 없어요.<br>퀴즈를 풀면 여기에 쌓여요.</div>` :
    sorted.map(n=>{

      return `<div class="note-card">

      </div>`;
    }).join('')

  if(r.sourceTag==='today') return getTodayQueue();

/* SONG_QUERY에 없는 태그(신규 카테고리, today/favorites처럼 여러 카테고리가 섞인 목록)는

function songInfoForTag(tag){
  if(SONG_QUERY[tag]) return SONG_QUERY[tag];
  if(tag==='today' || tag==='favorites') return { q:'toddler English learning songs playlist', verified:false, title:null };
  return { q:(TAG_LABEL[tag]||tag) + ' kids song nursery rhyme', verified:false, title:null };
}

    ${[10,20,30].map(m=>`<button class="${r.minutes===m?'active':''}" data-min="${m}">${m}분</button>`).join('')}
  </div>

  <div class="now-playing">${list.length===0 ? '재생할 문장이 없어요' : (r.playing ? `${(r.idx%list.length)+1} / ${list.length} 재생 중` : `총 ${list.length}문장 · 화면을 켠 채로 재생돼요`)}</div>

function bindRadio(){
  document.querySelectorAll('[data-src]').forEach(b=>{
    b.onclick = ()=>{
      const row = document.getElementById('radio-src-row');
      const scrollLeft = row ? row.scrollLeft : 0;
      STATE.radio.sourceTag = b.dataset.src; STATE.radio.idx=0;
      render();
      const newRow = document.getElementById('radio-src-row');
      if(newRow) newRow.scrollLeft = scrollLeft;
    };
  });
  document.querySelectorAll('[data-min]').forEach(b=>{
    b.onclick = ()=>{ STATE.radio.minutes = parseInt(b.dataset.min); render(); };
  });
  document.querySelectorAll('[data-mode]').forEach(b=>{
    b.onclick = ()=>{ STATE.radio.mode = b.dataset.mode; render(); };
  });
  document.getElementById('radio-toggle').onclick = ()=>{
    const r = STATE.radio;
    if(r.playing){ stopRadio(); } else { playRadio(); }
  };
  const songBtn = document.getElementById('song-link');
  if(songBtn) songBtn.onclick = ()=>{
    const info = songInfoForTag(STATE.radio.sourceTag);
    window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(info.q), '_blank');
  };
}
function playRadio(){
  const r = STATE.radio;
  const list = buildRadioList();
  if(list.length===0){ showToast('먼저 문장을 채워주세요'); return; }
  r.playing = true; r.idx = 0;
  const endAt = Date.now() + r.minutes*60000;
  const playNext = ()=>{
    if(!r.playing || Date.now() > endAt){ stopRadio(); return; }
    const it = list[r.idx % list.length];
    try{
      window.speechSynthesis.cancel();
      const u1 = new SpeechSynthesisUtterance(plainFullSentence(it, STATE.profile.name));
      u1.lang='en-US'; u1.rate=0.85; u1.pitch=1.05;
      if(r.mode==='enOnly'){
        u1.onend = ()=>{ r.idx++; renderAppOnly(); if(r.playing) setTimeout(playNext, 700); };
        window.speechSynthesis.speak(u1);
      } else {
        u1.onend = ()=>{
          const u2 = new SpeechSynthesisUtterance(fillName(it.meaning, STATE.profile.name));
          u2.lang='ko-KR'; u2.rate=1.0;
          u2.onend = ()=>{ r.idx++; renderAppOnly(); if(r.playing) setTimeout(playNext, 500); };
          window.speechSynthesis.speak(u2);
        };
        window.speechSynthesis.speak(u1);
      }
    }catch(e){ stopRadio(); }
  };
  playNext();
  render();
}
function stopRadio(){
  STATE.radio.playing = false;
  try{ window.speechSynthesis.cancel(); }catch(e){}
  render();
}

function screenSettings(){

  return `

  <div class="card" style="margin-bottom:16px;">

    <button class="btn-primary" id="notif-enable" style="width:100%;">🔔 알림 받기</button>
  </div>

  <div class="section-title">데이터</div>
  <button class="danger-btn" id="set-reset">학습 데이터 초기화</button>
  `;
}
function bindSettings(){
  const notifStatus = document.getElementById('notif-status');
  const notifBtn = document.getElementById('notif-enable');
  function renderNotifUi(OneSignal){
    const permission = OneSignal.Notifications.permission;
    const optedIn = OneSignal.User.PushSubscription.optedIn;
    if(!permission){
      if(notifStatus) notifStatus.textContent = '꺼짐';
      if(notifBtn){ notifBtn.textContent = '🔔 알림 받기'; notifBtn.disabled = false; notifBtn.dataset.mode = 'request'; }
    } else if(optedIn){
      if(notifStatus) notifStatus.textContent = '켜짐 ✓';
      if(notifBtn){ notifBtn.textContent = '🔕 알림 끄기'; notifBtn.disabled = false; notifBtn.dataset.mode = 'optout'; }
    } else {
      if(notifStatus) notifStatus.textContent = '꺼짐 (구독 해제됨)';
      if(notifBtn){ notifBtn.textContent = '🔔 알림 다시 켜기'; notifBtn.disabled = false; notifBtn.dataset.mode = 'optin'; }
    }
  }
  if(window.OneSignalDeferred){
    let resolved = false;
    setTimeout(()=>{ if(!resolved && notifStatus) notifStatus.textContent = '불러오기 실패 (새로고침 필요)'; }, 6000);
    OneSignalDeferred.push(async function(OneSignal){
      resolved = true;
      try{ renderNotifUi(OneSignal); }
      catch(e){ if(notifStatus) notifStatus.textContent = '지원 안 됨'; }
    });
  } else if(notifStatus){ notifStatus.textContent = '지원 안 됨'; }
  if(notifBtn) notifBtn.onclick = ()=>{
    if(!window.OneSignalDeferred){ showToast('이 브라우저에서는 알림을 지원하지 않아요'); return; }
    OneSignalDeferred.push(async function(OneSignal){
      try{
        const mode = notifBtn.dataset.mode;
        if(mode === 'optout'){
          await OneSignal.User.PushSubscription.optOut();
          showToast('알림을 껐어요');
        } else if(mode === 'optin'){
          await OneSignal.User.PushSubscription.optIn();
          showToast('알림을 다시 켰어요');
        } else {
          await OneSignal.Notifications.requestPermission();
          if(OneSignal.Notifications.permission){
            await OneSignal.User.PushSubscription.optIn();
            showToast('알림이 켜졌어요!');
          } else {
            showToast('알림이 차단됐어요. 폰 설정에서 이 사이트 알림을 허용해주세요');
          }
        }
        renderNotifUi(OneSignal);
      }catch(e){ showToast('알림 설정 변경에 실패했어요: ' + (e && e.message ? e.message : e)); }
    });
  };
  document.getElementById('set-save').onclick = async ()=>{
    const name = document.getElementById('set-name').value.trim();
    const birth = document.getElementById('set-birth').value;
    if(!name || !birth){ showToast('이름과 생년월일을 확인해주세요'); return; }
    STATE.profile = {name, birth};
    await saveProfile();
    showToast('저장했어요');
    render();
  };
  document.getElementById('set-reset').onclick = async ()=>{
    if(!confirm('모든 학습 기록이 사라져요. 초기화할까요?')) return;
    STATE.progress = {streak:0, lastCompleted:null, wrongNotes:[], favorites:[], usageLog:{}, seenIds:[], todayQueueDate:null, todayQueueIds:[], attendance:{month:'', days:[]}};
    await saveProgress();
    showToast('초기화했어요');
    render();
  };
}

  return html + modalWord();
}
function bindCurrentScreen(){
  switch(STATE.screen){
    case 'onboarding': bindOnboarding(); break;
    case 'home': bindHome(); bindModal(); break;
    case 'quiz': bindQuiz(); break;
    case 'quizResult': bindQuizResult(); break;

    case 'favorites': bindFavorites(); break;
    case 'radio': bindRadio(); break;
    case 'settings': bindSettings(); break;
  }
  bindWordModal();
}
function ensureHistoryEntry(){
  if(!STATE._historyPushed){
    try{ history.pushState({app:true}, ''); }catch(e){}
    STATE._historyPushed = true;
  }
}
window.addEventListener('popstate', ()=>{
  STATE._historyPushed = false;
  if(STATE.wordModal){ STATE.wordModal = null; render(); return; }
  STATE.searchTerm=''; STATE.detailItem=null; STATE.quiz=null; STATE.screen='home';
  render();
});

function render(){
  document.getElementById('app').innerHTML = currentScreenHtml();
  renderNav();
  bindCurrentScreen();
  document.getElementById('app').scrollTop = 0;
  const atBaseline = STATE.screen==='home' && !STATE.searchTerm && !STATE.detailItem && !STATE.wordModal;
  if(!atBaseline) ensureHistoryEntry();
  else STATE._historyPushed = false;
}

document.getElementById('app').addEventListener('click', (e)=>{
  const target = e.target.closest('.word-tap');
  if(target && target.dataset.word){ openWordModal(target.dataset.word); }
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

loadState();
